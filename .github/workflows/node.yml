name: Node bindings

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        env:
          NODE_OBSCURA_SKIP_NATIVE_BUILD: "1"
        run: npm ci

      - name: Build native binding
        run: npm run build:native -- --target ${{ matrix.target }}

      - name: Test
        run: npm test

      - name: Upload native binding
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: node-obscura.*.node
          if-no-files-found: error

  release:
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        env:
          NODE_OBSCURA_SKIP_SOURCE_SETUP: "1"
        run: npm ci --omit=optional

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${PACKAGE_VERSION}" >&2
            exit 1
          fi

      - name: Download native bindings
        uses: actions/download-artifact@v4
        with:
          pattern: bindings-*
          path: artifacts
          merge-multiple: true

      - name: Prepare npm packages
        run: |
          npx napi create-npm-dirs
          npx napi artifacts --output-dir ./artifacts

      - name: Publish platform packages and create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx napi pre-publish --tag-style npm --gh-release-name "${GITHUB_REF_NAME}"

      - name: Publish root npm package
        run: npm publish --ignore-scripts --access public
